  <circle cx="16" cy="15" r="8" fill="#e8f5e9" opacity="0.95"/>

  <!-- 물결(물/대기) -->
  <path
    d="M9 19c1.2 1 2.4 1.5 3.6 1.5 1.2 0 2.4-.5 3.6-1.5 1.2 1 2.4 1.5 3.6 1.5 1.2 0 2.4-.5 3.6-1.5v2c-1.2 1-2.4 1.5-3.6 1.5-1.2 0-2.4-.5-3.6-1.5-1.2 1-2.4 1.5-3.6 1.5-1.2 0-2.4-.5-3.6-1.5V19z"
    fill="url(#water)"
    opacity="0.9"
  />

  <!-- 잎사귀(에너지·탄소중립 상징) -->
