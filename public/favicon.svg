    d="M11 10.5c2.8-1.5 6.5-1.4 9 0.8 1.8 1.6 2.3 4.1 1.3 6.3-2.8 1.5-6.5 1.4-9-0.8C10.5 15.2 10 12.7 11 10.5z"
